name: GoogleJavaFormat

on:
  pull_request:
    paths-ignore:
      - '.claude/**'
  push:
    branches:
      - master
    paths-ignore:
      - '.claude/**'

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '11'
      - name: Format code
        run: ./format.sh
      - if: ${{ failure() }}
        run: git diff --color=always
